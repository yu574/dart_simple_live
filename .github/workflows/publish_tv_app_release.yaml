name: app-build-action

on:
  push:
    tags:
      - "tv_*"

jobs:
  build-tv:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # ⭐ 强力修复 build.gradle.kts（自动处理所有不安全的类型转换）
      - name: Auto-fix build.gradle.kts
        run: |
          cd simple_live_tv_app/android/app
          echo "📄 原始文件内容（前50行）："
          head -n 50 build.gradle.kts
          echo ""
          echo "🔧 开始修复..."
          # 将所有的 getProperty("xxx") as String 替换为 getProperty("xxx") ?: ""
          sed -i '' -E 's/(getProperty\([^)]*\))[[:space:]]*as[[:space:]]*String/\1 ?: ""/g' build.gradle.kts
          # 如果还有 .getProperty 或 getProperty 前面有空格的情况
          sed -i '' -E 's/(\.getProperty\([^)]*\))[[:space:]]*as[[:space:]]*String/\1 ?: ""/g' build.gradle.kts
          echo "✅ 修复完成！修改后的内容（第40-50行）："
          sed -n '40,50p' build.gradle.kts

      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      - name: Build APK (Debug)
        run: |
          cd simple_live_tv_app
          flutter build apk --debug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv_debug
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/tv_app_version.json

      - name: Echo version
        run: echo "${{ fromJson(steps.version.outputs.content).version }}"

      - name: Echo version content
        run: echo "${{ fromJson(steps.version.outputs.content).version_desc }}"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "# Android TV \n${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-debug.apk

      - run: echo "🍏 This job's status is ${{ job.status }}."
