name: app-build-action

on:
  push:
    tags:
      - "tv_*"

jobs:
  build-tv:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # ⭐ 自动修复 build.gradle.kts 中的类型转换错误
      - name: Fix build.gradle.kts
        run: |
          cd simple_live_tv_app/android/app
          # 将 'as String' 替换为 '?: ""' （安全转换）
          sed -i '' 's/getProperty("storeFile") as String/getProperty("storeFile") ?: ""/g' build.gradle.kts
          sed -i '' 's/getProperty("storePassword") as String/getProperty("storePassword") ?: ""/g' build.gradle.kts
          sed -i '' 's/getProperty("keyPassword") as String/getProperty("keyPassword") ?: ""/g' build.gradle.kts
          sed -i '' 's/getProperty("keyAlias") as String/getProperty("keyAlias") ?: ""/g' build.gradle.kts
          # 如果文件是 Groovy 则换成 .gradle，但这里是 .kts
          cat build.gradle.kts  # 可选，查看修改结果

      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      - name: Build APK (Debug)
        run: |
          cd simple_live_tv_app
          flutter build apk --debug

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv_debug
          path: simple_live_tv_app/build/app/outputs/flutter-apk/app-debug.apk

      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/tv_app_version.json

      - name: Echo version
        run: echo "${{ fromJson(steps.version.outputs.content).version }}"

      - name: Echo version content
        run: echo "${{ fromJson(steps.version.outputs.content).version_desc }}"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "# Android TV \n${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          token: ${{ secrets.TOKEN }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-debug.apk

      - run: echo "🍏 This job's status is ${{ job.status }}."
