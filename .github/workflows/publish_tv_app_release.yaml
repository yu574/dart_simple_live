name: app-build-action

on:
  push:
    tags:
      - "tv_*"

jobs:
  build-tv:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"

      - name: Flutter action
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.38.x"
          cache: true

      # ⭐ 手动解码 Base64 为 keystore.jks（比第三方 Action 更可靠）
      - name: Decode keystore
        run: |
          echo "${{ secrets.TV_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/keystore.jks
          if [ -f "${{ github.workspace }}/keystore.jks" ]; then
            echo "✅ keystore.jks created successfully"
            ls -la ${{ github.workspace }}/keystore.jks
          else
            echo "❌ Failed to create keystore.jks"
            exit 1
          fi

      # ⭐ 创建 key.properties（指向解码后的文件）
      - name: Create key.properties
        run: |
          cd simple_live_tv_app/android
          echo "storeFile=${{ github.workspace }}/keystore.jks" > key.properties
          echo "storePassword=${{ secrets.TV_STORE_PASSWORD }}" >> key.properties
          echo "keyPassword=${{ secrets.TV_KEY_PASSWORD }}" >> key.properties
          echo "keyAlias=${{ secrets.TV_KEY_ALIAS }}" >> key.properties
          echo "✅ key.properties content:"
          cat key.properties

      # 修复 build.gradle.kts 类型转换
      - name: Auto-fix build.gradle.kts
        run: |
          cd simple_live_tv_app/android/app
          sed -i '' -E 's/keystoreProperties\["([^"]*)"\] as String/keystoreProperties["\1"] as? String ?: ""/g' build.gradle.kts

      - name: Restore packages
        run: |
          cd simple_live_tv_app
          flutter pub get

      - name: Build Release APK (split ABI)
        run: |
          cd simple_live_tv_app
          flutter build apk --release --split-per-abi

      - name: Upload APKs to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android_tv_release
          path: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - name: Read version
        id: version
        uses: juliangruber/read-file-action@v1
        with:
          path: assets/tv_app_version.json

      - name: Echo version
        run: echo "${{ fromJson(steps.version.outputs.content).version }}"

      - name: Echo version content
        run: echo "${{ fromJson(steps.version.outputs.content).version_desc }}"

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ fromJson(steps.version.outputs.content).version }}"
          body: "# Android TV \n${{ fromJson(steps.version.outputs.content).version_desc }}"
          prerelease: ${{ fromJson(steps.version.outputs.content).prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            simple_live_tv_app/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            simple_live_tv_app/build/app/outputs/flutter-apk/app-x86_64-release.apk

      - run: echo "🍏 Done"
